import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, onValue, set, update, remove, get, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyDdtoBbNee-dLRjr6YEEhzxM6GCmVE6wTs",
    authDomain: "heitmannspizza-dashboard.firebaseapp.com",
    databaseURL: "https://heitmannspizza-dashboard-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "heitmannspizza-dashboard"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

// ============================================================================
// HELPERS & SECURITY (HIER WAR DER SYNTAX-FEHLER, JETZT BEHOBEN!)
// ============================================================================
const $ = id => document.getElementById(id);

const esc = (str) => {
    if (str === null || str === undefined) return '';
    return String(str).replace(/[&<>'"]/g, tag => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
    }[tag] || tag));
};
const escJs = (str) => String(str || '').replace(/['"\\]/g, '\\$&');

const today = () => new Date().toISOString().split('T')[0];
const find = (arr, id, key = 'id') => (arr || []).find(x => String(x[key]) === String(id));
const eq = (a, b) => String(a) === String(b);
const fmt = n => Number(n || 0).toLocaleString('de-DE', { style: 'currency', currency: 'EUR' });
const fmtKG = g => (g / 1000).toLocaleString('de-DE', { minimumFractionDigits: 3, maximumFractionDigits: 3 }) + ' kg';
const fmtDate = (d, opts = { weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric' }) =>
    new Date(d).toLocaleDateString('de-DE', opts);

function showToast(message, type = '') {
    const wrap = $('toast-wrap'); if (!wrap) return;
    const toast = document.createElement('div');
    toast.className = 'toast show ' + type;
    toast.textContent = message;
    wrap.appendChild(toast);
    setTimeout(() => toast.remove(), 2800);
}

const openModal = id => { const m = $(id); if (m) m.classList.add('open'); };
const closeModal = id => { const m = $(id); if (m) m.classList.remove('open'); };

function dbAction(promise, okMsg, errMsg = 'Fehler beim Speichern.') {
    return promise
        .then(() => { if (okMsg) showToast(okMsg, 'success'); })
        .catch(() => showToast(errMsg, 'error'));
}

function statusBadge(s) {
    const m = { Secured: 'badge-green', 'Pending...': 'badge-amber', Cancelled: 'badge-red' };
    return `<span class="badge ${m[s] || 'badge-blue'}">${esc(s)}</span>`;
}

function confirmAction(type, url) {
    const msgs = {
        tel: "Möchtest du diese Nummer wirklich anrufen?",
        mail: "Möchtest du eine E-Mail verfassen?",
        map: "Möchtest du die Adresse in Google Maps öffnen?"
    };
    if (confirm(msgs[type])) window.open(url, type === 'map' ? '_blank' : '_self');
}

function calculateHours(startStr, endStr, startDateStr, endDateStr) {
    if (!startStr || !endStr) return 0;
    const [sH, sM] = startStr.split(':').map(Number);
    const [eH, eM] = endStr.split(':').map(Number);
    const sDate = startDateStr ? new Date(startDateStr) : new Date();
    sDate.setHours(sH, sM, 0, 0);
    const eDate = endDateStr ? new Date(endDateStr) : new Date(sDate);
    eDate.setHours(eH, eM, 0, 0);
    if (!endDateStr && eDate < sDate) eDate.setDate(eDate.getDate() + 1);
    const diff = (eDate - sDate) / (1000 * 60 * 60);
    return diff > 0 ? diff : 0;
}

const getIngredient = id => find(state.ingredients, id);
const isAdminRole = () => state.role === 'admin' || state.role === 'superadmin';
const mapsUrl = addr => 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(addr);

function buildTable(headers, rows, emptyMsg = 'Keine Daten.') {
    if (!rows.length) return `<div class="muted">${emptyMsg}</div>`;
    return `<table><thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.join('')}</tbody></table>`;
}

// ============================================================================
// STATE
// ============================================================================
let state = {
    role: 'staff',
    events: [], kontakte: [], einkauf: [], recipes: [], pizzas: [],
    ingredients: [], users: [], timesheets: [],
    cateringDefaults: {}, cateringScenarios: [],
    calYear: new Date().getFullYear(),
    calMonth: new Date().getMonth(),
    editEventId: null, editKontaktId: null, editTimesheetId: null,
    pinnwand: '', currentUserName: ''
};

let pizzaMengen = {};
let dipMengen = { aioli: 0, hothoney: 0 };
let builderType = '', builderEditId = null, builderItems = [];
let currentAvailEventId = null;
let scenarioRows = [];
let plannerCurrentEventId = null;
let plannerAssigned = [];
let pinTimer = null; 

const colorMap = {
    'Catering': 'tag-Catering', 'Event': 'tag-Event', 'Meeting': 'tag-Meeting',
    'Preppen': 'tag-Preppen', 'Einkaufen': 'tag-Einkaufen', 'SocialMedia': 'tag-SocialMedia'
};

let listenersInitialized = false;
let unsubscribers = [];

// ============================================================================
// AUTHENTICATION
// ============================================================================
onAuthStateChanged(auth, u => {
    if (u) {
        $('login-screen').style.display = 'none';
        $('main-app').style.display = 'flex';
        const userRef = ref(db, 'users/' + u.uid);
        const unsubUser = onValue(userRef, snap => {
            const user = snap.val();
            if (!user) {
                const defaultName = u.email.split('@')[0];
                set(userRef, { email: u.email, name: defaultName, role: 'staff', cleaningPoints: 0, wage: 14 })
                    .catch(() => showToast('Profil konnte nicht angelegt werden.', 'error'));
                return;
            }
            if (!user.name || user.name.trim() === '') {
                const defaultName = u.email.split('@')[0];
                set(ref(db, `users/${u.uid}/name`), defaultName);
                user.name = defaultName;
            }
            state.role = user.role || 'staff';
            state.currentUserName = user.name;
            document.body.setAttribute('data-role', state.role);
            $('dash-greeting').textContent = `Willkommen, ${user.name.split(' ')[0]}!`;
            enforceRBAC();
            if (!listenersInitialized) {
                listenersInitialized = true;
                initGranularListeners();
                loadPizzaMengenFromStorage();
            }
        });
        unsubscribers.push(unsubUser);
    } else {
        $('login-screen').style.display = 'flex';
        $('main-app').style.display = 'none';
        teardownListeners();
        listenersInitialized = false;
        state.role = 'staff';
    }
});

function teardownListeners() {
    unsubscribers.forEach(fn => { try { fn(); } catch (e) {} });
    unsubscribers = [];
}

function authSignOut() {
    teardownListeners();
    listenersInitialized = false;
    signOut(auth);
}

function doLogin() {
    const e = $('login-email').value.trim();
    const p = $('login-pass').value;
    if (!e || p.length !== 4) return alert("Bitte gültige E-Mail und 4-stellige PIN eingeben!");
    
    const pw = p + "-hp26";
    
    signInWithEmailAndPassword(auth, e, pw).catch(err => {
        // Falls Login fehlschlägt (Falsches Passwort ODER Account nicht vorhanden)
        // versuchen wir den Account neu zu registrieren.
        createUserWithEmailAndPassword(auth, e, pw).catch(regErr => {
            if (regErr.code === 'auth/email-already-in-use') {
                // Wenn E-Mail schon vergeben, dann war die PIN beim Login definitiv falsch!
                alert("Falsche PIN für diesen Account!");
            } else {
                alert("Login/Registrierungs-Fehler: " + regErr.message);
            }
        });
    });
}

function enforceRBAC() {
    if (!isAdminRole()) document.querySelectorAll('.admin-only').forEach(el => el.remove());
    if (state.role !== 'superadmin') document.querySelectorAll('.superadmin-only').forEach(el => el.remove());
}

// ============================================================================
// LISTENERS
// ============================================================================
function initGranularListeners() {
    unsubscribers.push(onValue(ref(db, 'events'), snap => {
        const d = snap.val() || {};
        state.events = Object.entries(d)
            .filter(([k, ev]) => ev !== null && typeof ev === 'object')
            .map(([k, ev]) => Object.assign({}, ev, {
                id: k, endDate: ev.endDate || ev.date,
                assignedCrew: ev.assignedCrew || [],
                availUIDs: ev.availUIDs || [], unavailUIDs: ev.unavailUIDs || [],
                availDetails: ev.availDetails || {}
            }))
            .sort((a, b) => (a.date || '') > (b.date || '') ? 1 : -1);
        renderEventList(); renderCalendar(); updateDashboard();
        if (isAdminRole()) renderPlanner();
    }));

    unsubscribers.push(onValue(ref(db, 'users'), snap => {
        const d = snap.val() || {};
        state.users = Object.entries(d).map(([uid, data]) => ({ uid, ...data }));
        updateDashboard();
        if (isAdminRole()) { renderTimesheets(); renderPlanner(); }
        if (state.role === 'superadmin') renderSettings();
    }));

    unsubscribers.push(onValue(ref(db, 'ingredients'), snap => {
        state.ingredients = Object.values(snap.val() || {}).filter(i => i && i.id);
        if (state.role === 'superadmin') renderSettings();
        renderPizzaResult();
    }));

    unsubscribers.push(onValue(ref(db, 'recipes'), snap => {
        state.recipes = Object.values(snap.val() || {}).filter(r => r && r.id);
        if (state.role === 'superadmin') renderSettings();
        renderPizzaResult();
    }));

    unsubscribers.push(onValue(ref(db, 'pizzas'), snap => {
        state.pizzas = Object.values(snap.val() || {}).filter(p => p && p.id);
        renderPizzaGrid();
        if (state.role === 'superadmin') renderSettings();
    }));

    unsubscribers.push(onValue(ref(db, 'cateringDefaults'), snap => {
        state.cateringDefaults = snap.val() || { gas: 10, entsorgung: 15, miete: 45, kmsatz: 0.8, waren: 3.5, ust: 1.19, stundensatz: 14 };
        if (state.cateringDefaults.stundensatz === undefined) state.cateringDefaults.stundensatz = 14;
        if (state.role === 'superadmin') renderSettings();
        calcCatering();
    }));

    unsubscribers.push(onValue(ref(db, 'cateringScenarios'), snap => {
        const v = snap.val();
        state.cateringScenarios = Array.isArray(v) ? v : (v ? Object.values(v) : [{ min: 30, max: 49, label: 'Klein', stunden: 35, marge: 0.5 }]);
        if (state.role === 'superadmin') renderSettings();
        calcCatering();
    }));

    unsubscribers.push(onValue(ref(db, 'pinnwand'), snap => {
        state.pinnwand = snap.val() || '';
        const p = $('pinnwand');
        if (p && document.activeElement !== p) p.value = state.pinnwand;
    }));

    if (isAdminRole()) {
        unsubscribers.push(onValue(ref(db, 'kontakte'), snap => {
            const d = snap.val() || {};
            state.kontakte = Object.entries(d)
                .filter(([k, v]) => v !== null && typeof v === 'object')
                .map(([k, v]) => ({ ...v, id: k }));
            renderKontakte();
        }));
        unsubscribers.push(onValue(ref(db, 'einkauf'), snap => {
            const d = snap.val() || {};
            state.einkauf = Array.isArray(d) ? d.filter(Boolean) : Object.values(d).filter(e => e && e.id);
            renderEinkauf();
        }));
        unsubscribers.push(onValue(ref(db, 'timesheets'), snap => {
            state.timesheets = Object.values(snap.val() || {}).filter(t => t && t.id);
            renderTimesheets();
            renderEventList();
        }));
    } else {
        unsubscribers.push(onValue(ref(db, 'timesheets'), snap => {
            const d = snap.val() || {};
            state.timesheets = Object.values(d).filter(t => t && t.id && t.userId === auth.currentUser.uid);
            renderEventList();
        }));
    }
}

// ============================================================================
// NAVIGATION
// ============================================================================
function navTo(id, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item, .mobile-bottom-nav button').forEach(n => n.classList.remove('active'));
    const target = $('page-' + id);
    if (target) target.classList.add('active');
    if (btn) btn.classList.add('active');
}

function switchSettingsTab(id, btn) {
    const container = btn.closest('.page');
    if (!container) return;
    container.querySelectorAll('.settings-tab').forEach(t => t.classList.remove('active'));
    container.querySelectorAll('.settings-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    const panel = container.querySelector('#panel-' + id);
    if (panel) panel.classList.add('active');
}

// DASHBOARD
// ============================================================================
function updateDashboard() {
    const td = $('today-date');
    if (td) td.textContent = fmtDate(new Date(), { weekday: 'long', day: 'numeric', month: 'long' });
    const u = auth.currentUser;
    if (u) {
        const myData = find(state.users, u.uid, 'uid');
        const msgs = (myData && myData.notifications) || [];
        const mb = $('dash-mailbox');
        if (mb) mb.innerHTML = msgs.length
            ? [...msgs].reverse().map(m => `<div class="mailbox-item unread">${esc(m)}</div>`).join('')
            : "Keine ungelesenen Nachrichten.";
    }
    if (isAdminRole()) {
        const admins = state.users.filter(x => x.role === 'admin' || x.role === 'superadmin')
            .sort((a, b) => (b.cleaningPoints || 0) - (a.cleaningPoints || 0));
        const prev = $('cleaning-ranking-preview');
        const cont = $('ranking-content');
        if (admins.length > 0 && prev) {
            const next = admins[0];
            prev.innerHTML = `<div style="color:var(--red); font-weight:700;">Als nächstes dran: ${esc(next.name)} (${Number(next.cleaningPoints) || 0} Pkt)</div>`;
            if (cont) {
                const isSuper = state.role === 'superadmin';
                cont.innerHTML = admins.map(a => `
                    <div class="row-between" style="padding:10px; border-bottom:1px solid #f1f5f9; align-items:center;">
                        <span>${esc(a.name)}</span>
                        <div style="display:flex; align-items:center; gap:8px;">
                            ${isSuper ? `<button class="btn-sm" style="padding:4px 8px;" onclick="changeCleaningPoints('${escJs(a.uid)}', -1)">-</button>` : ''}
                            <b style="min-width:55px; text-align:center;">${Number(a.cleaningPoints) || 0} Pkt</b>
                            ${isSuper ? `<button class="btn-sm" style="padding:4px 8px;" onclick="changeCleaningPoints('${escJs(a.uid)}', 1)">+</button>` : ''}
                        </div>
                    </div>`).join('');
            }
        }
    }
    const todayStr = today();
    const next = state.events.filter(e => (e.endDate || e.date) >= todayStr).slice(0, 4);
    const de = $('dash-events');
    if (de) de.innerHTML = next.map(e => `
        <div class="row-between" style="padding:10px 0; border-bottom:1px solid var(--border); cursor:pointer;" onclick="showEventDetail('${escJs(e.id)}')">
            <div>
                <b style="font-size:14px;">${esc(e.title)}</b><br>
                <div class="muted" style="font-size:12px; margin-top:2px;">${esc(e.date)}${e.endDate && e.endDate !== e.date ? ' - ' + esc(e.endDate) : ''} · ${esc(e.type)}</div>
            </div>
            ${statusBadge(e.status)}
        </div>`).join('');
}

        remove(ref(db, `users/${auth.currentUser.uid}/notifications`));

function savePin() {
    if (!isAdminRole()) return;

const openRankingModal = () => openModal('ranking-modal');

// ============================================================================
// KALENDER
// ============================================================================
function renderCalendar() {
    const y = state.calYear, m = state.calMonth;
    const ct = $('cal-title');
    if (ct) ct.textContent = new Intl.DateTimeFormat('de-DE', { month: 'long', year: 'numeric' }).format(new Date(y, m));
    const firstDay = (new Date(y, m, 1).getDay() + 6) % 7;
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    const headers = $('cal-headers');
    if (headers) headers.innerHTML = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'].map(d => `<div class="cal-header-cell">${d}</div>`).join('');
    let html = '';
    for (let i = 0; i < firstDay; i++) html += '<div></div>';
    const todayStr = today();
    for (let d = 1; d <= daysInMonth; d++) {
        const curDate = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const evs = state.events.filter(e => curDate >= e.date && curDate <= (e.endDate || e.date));
        const visibleEvs = state.role === 'staff' ? evs.filter(e => ['Catering', 'Event'].includes(e.type)) : evs;
        const isToday = todayStr === curDate;
        html += `
            <div class="cal-day ${isToday ? 'today' : ''}" onclick="openDayEventsModal('${curDate}')">
                <span style="color:${isToday ? 'var(--blue)' : 'inherit'}">${d}</span>
                <div style="display:flex; flex-direction:column; gap:2px; margin-top:4px;">
                ${visibleEvs.map(e => `<div class="cal-tag ${colorMap[e.type] || 'tag-Event'}">${esc(e.title)}</div>`).join('')}
                </div>
            </div>`;
    }
    const body = $('cal-body');
    if (body) body.innerHTML = html;
}

function changeMonth(d) {
    state.calMonth += d;
    if (state.calMonth > 11) { state.calMonth = 0; state.calYear++; }
    if (state.calMonth < 0) { state.calMonth = 11; state.calYear--; }
    renderCalendar();
}

function openDayEventsModal(dateStr) {
    const evs = state.events.filter(e => dateStr >= e.date && dateStr <= (e.endDate || e.date));
    const visibleEvs = state.role === 'staff' ? evs.filter(e => ['Catering', 'Event'].includes(e.type)) : evs;
    $('day-events-title').textContent = `Termine am ${fmtDate(dateStr)}`;
    $('day-events-list').innerHTML = visibleEvs.length === 0
        ? '<div class="muted-empty">Keine Termine an diesem Tag.</div>'
        : visibleEvs.map(e => `
            <div class="list-item" style="cursor:pointer; margin-bottom:8px; padding:12px;" onclick="closeModal('day-events-modal'); showEventDetail('${escJs(e.id)}')">
                <div style="flex:1;">
                    <div class="label-tag" style="margin-bottom:4px;">${esc(e.type)}</div>
                    <div style="font-size:16px; font-weight:700;">${esc(e.title)}</div>
                </div>
                ${statusBadge(e.status)}
            </div>`).join('');
    const addBtn = $('day-events-add-btn');
    if (addBtn) addBtn.onclick = () => { closeModal('day-events-modal'); openEventModal(null, dateStr); };
    openModal('day-events-modal');
}

// ============================================================================
// EVENTS LISTE
// ============================================================================
function renderEventList() {
    const c = $('all-events-list');
    if (!c) return;
    const filtered = state.role === 'staff' ? state.events.filter(e => ['Catering', 'Event'].includes(e.type)) : state.events;
    const uid = auth.currentUser ? auth.currentUser.uid : '';
    c.innerHTML = filtered.map(e => {
        const isAvail = e.availUIDs.includes(uid);
        const isUnavail = e.unavailUIDs.includes(uid);
        const isPastEvent = today() >= e.date;
        let timeEntryHtml = '';
        if (e.status === 'Secured' && isPastEvent) {
            const userTs = state.timesheets.find(t => eq(t.eventId, e.id) && eq(t.userId, uid));
            const isEdit = !!userTs;
            const titleText = isEdit ? `MEINE ZEITEN BEARBEITEN (${userTs.totalHours}h erfasst):` : `MEINE ZEITEN ERFASSEN:`;
            const btnText = isEdit ? `Aktualisieren` : `Speichern`;
            timeEntryHtml = `
                <div style="width:100%; margin-top:12px; display:flex; align-items:center; gap:8px; background:#f8fafc; padding:10px; border-radius:8px; border:1px solid var(--border); flex-wrap:wrap;">
                    <div style="font-size:11px; font-weight:700; color:var(--blue); width:100%;">${titleText}</div>
                    <div style="display:flex; flex:1; gap:6px; align-items:center;">
                        <input type="time" id="ts-start-${esc(e.id)}" value="${esc(userTs ? userTs.start : (e.time || ''))}" style="padding:8px; background:#fff; border:1px solid var(--border);">
                        <span class="muted" style="font-size:12px;">bis</span>
                        <input type="time" id="ts-end-${esc(e.id)}" value="${esc(userTs ? userTs.end : (e.timeEnd || ''))}" style="padding:8px; background:#fff; border:1px solid var(--border);">
                    </div>
                    <button class="btn-sm btn-primary" style="height:36px;" onclick="logHours('${escJs(e.id)}')">${btnText}</button>
                </div>`;
        }
        return `
            <div class="event-card">
                <div class="event-card-header" onclick="showEventDetail('${escJs(e.id)}')">
                    <div class="label-tag">${esc(e.type)} · ${esc(e.date)}${e.endDate && e.endDate !== e.date ? ' bis ' + esc(e.endDate) : ''}</div>
                    ${statusBadge(e.status)}
                </div>
                <div class="event-card-body" onclick="showEventDetail('${escJs(e.id)}')">
                    <div style="font-size:18px; font-weight:700;">${esc(e.title)}</div>
                    <div class="muted" style="font-size:13px; margin-top:4px;">📍 ${esc(e.ort || 'Kein Ort angegeben')}</div>
                </div>
                <div class="event-card-footer">
                    <button class="btn-sm ${isAvail ? 'btn-green' : ''}" onclick="toggleAvail('${escJs(e.id)}', true)">${isAvail ? '✅ Zugesagt' : '🙋‍♂️ Habe Zeit'}</button>
                    <button class="btn-sm ${isUnavail ? 'btn-danger' : ''}" onclick="toggleAvail('${escJs(e.id)}', false)">${isUnavail ? '❌ Abgesagt' : '🚫 Keine Zeit'}</button>
                    ${timeEntryHtml}
                </div>
            </div>`;
    }).join('');
}

function toggleAvail(eid, isAvailable) {
    const uid = auth.currentUser.uid;
    const ev = find(state.events, eid);
    if (!ev) return;
    if (isAvailable) {
        const start = new Date(ev.date);
        const end = new Date(ev.endDate || ev.date);
        const daysDiff = Math.round((end - start) / (1000 * 60 * 60 * 24));
        if (daysDiff > 0) {
            currentAvailEventId = eid;
            let html = '';
            for (let i = 0; i <= daysDiff; i++) {
                const d = new Date(start); d.setDate(d.getDate() + i);
                const dStr = d.toISOString().split('T')[0];
                const dDisp = d.toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: '2-digit' });
                const isChecked = (ev.availDetails && ev.availDetails[uid] && ev.availDetails[uid].includes(dStr)) ? 'checked' : '';
                html += `<label style="display:flex; align-items:center; gap:12px; padding:12px; border-bottom:1px solid #f1f5f9; cursor:pointer;">
                    <input type="checkbox" class="avail-cb" value="${esc(dStr)}" ${isChecked} style="width:24px; height:24px;">
                    <span style="font-size:16px;">${esc(dDisp)}</span>
                </label>`;
            }
            $('avail-days-container').innerHTML = html;
            openModal('avail-modal');
            return;
        }
    }
    runTransaction(ref(db, `events/${eid}`), eData => {
        if (!eData) return eData;
        let a = eData.availUIDs || [], u = eData.unavailUIDs || [];
        let details = eData.availDetails || {};
        if (isAvailable) {
            if (!a.includes(uid)) a.push(uid);
            u = u.filter(x => x !== uid);
            details[uid] = [eData.date];
        } else {
            if (u.includes(uid)) u = u.filter(x => x !== uid);
            else { u.push(uid); a = a.filter(x => x !== uid); }
            delete details[uid];
        }
        eData.availUIDs = a; eData.unavailUIDs = u; eData.availDetails = details;
        return eData;
    }).then(() => showToast("Verfügbarkeit gespeichert!", 'success'))
      .catch(() => showToast("Fehler beim Speichern.", 'error'));
}

function saveAvailDays() {
    const uid = auth.currentUser.uid;
    const selectedDays = Array.from(document.querySelectorAll('.avail-cb:checked')).map(cb => cb.value);
    runTransaction(ref(db, `events/${currentAvailEventId}`), eData => {
        if (!eData) return eData;
        let a = eData.availUIDs || [], u = eData.unavailUIDs || [];
        let details = eData.availDetails || {};
        if (selectedDays.length > 0) {
            if (!a.includes(uid)) a.push(uid);
            u = u.filter(x => x !== uid);
            details[uid] = selectedDays;
        } else {
            if (!u.includes(uid)) u.push(uid);
            a = a.filter(x => x !== uid);
            delete details[uid];
        }
        eData.availUIDs = a; eData.unavailUIDs = u; eData.availDetails = details;
        return eData;
    }).then(() => {
        showToast("Verfügbarkeit gespeichert!", 'success');
        closeModal('avail-modal');
    }).catch(() => showToast("Fehler beim Speichern.", 'error'));
}

function renderPlanner() {
    const c = $('planner-events-grid');
    if (!c) return;
    const todayStr = today();
    const upcoming = state.events.filter(e => (e.endDate || e.date) >= todayStr);
    if (upcoming.length === 0) { c.innerHTML = '<div class="muted">Keine anstehenden Events.</div>'; return; }
    c.innerHTML = upcoming.map(e => {
        const availCount = (e.availUIDs || []).length;
        const assignedCount = (e.assignedCrew || []).length;
        return `
            <div class="list-item" style="flex-direction:column; align-items:stretch;">
                <div class="row-between" style="margin-bottom:8px;">
                    <b style="font-size:16px;">${esc(e.title)}</b>
                    <span class="badge badge-blue">${esc(e.date)}</span>
                </div>
                <div class="muted" style="font-size:13px; margin-bottom:12px;">
                    Zusagen: <b style="color:var(--green)">${availCount}</b> | Eingeteilt: <b style="color:var(--blue)">${assignedCount}</b>
                </div>
                <button class="btn-sm btn-primary" onclick="openPlannerModal('${escJs(e.id)}')">Personal zuteilen</button>
            </div>`;
    }).join('');
}

function openPlannerModal(id) {
    plannerCurrentEventId = id;
    const ev = find(state.events, id);
    if (!ev) return;
    $('planner-modal-title').textContent = `Personal für: ${ev.title}`;
    plannerAssigned = [...(ev.assignedCrew || [])];
    renderPlannerUI();
    openModal('planner-modal');
}

function renderPlannerUI() {
    const ev = find(state.events, plannerCurrentEventId);
    if (!ev) return;
    const buildItem = (uid, cls, sym, action) => {
        const u = find(state.users, uid, 'uid');
        if (!u) return '';
        return `<div class="list-item" style="padding:10px; margin-bottom:0; justify-content:space-between; align-items:center;">
            <span>${esc(u.name)}</span>
            <button class="btn-sm ${cls}" onclick="plannerMove('${escJs(uid)}', '${action}')">${sym}</button>
        </div>`;
    };
    const availPool = (ev.availUIDs || []).filter(uid => !plannerAssigned.includes(uid));
    const availHtml = availPool.map(uid => buildItem(uid, 'btn-green', '+', 'add')).join('');
    const assignedHtml = plannerAssigned.map(uid => buildItem(uid, 'btn-danger', '-', 'remove')).join('');
    $('planner-avail-list').innerHTML = availHtml || '<div class="muted-empty" style="padding:10px;">Alle Zusagen verplant.</div>';
    $('planner-assigned-list').innerHTML = assignedHtml || '<div class="muted-empty" style="padding:10px;">Noch niemand eingeteilt.</div>';
}

function plannerMove(uid, action) {
    if (action === 'add') { if (!plannerAssigned.includes(uid)) plannerAssigned.push(uid); }
    else { plannerAssigned = plannerAssigned.filter(id => id !== uid); }
    renderPlannerUI();
}

function savePlanner() {
    if (!plannerCurrentEventId) return;
    const ev = find(state.events, plannerCurrentEventId);
    if (!ev) return;
    runTransaction(ref(db, `events/${plannerCurrentEventId}/assignedCrew`), () => plannerAssigned)
        .then(() => {
            const oldAssigned = (ev.assignedCrew || []);
            const newlyAssigned = plannerAssigned.filter(uid => !oldAssigned.includes(uid));
            newlyAssigned.forEach(uid => {
                runTransaction(ref(db, `users/${uid}/notifications`), arr => {
                    const list = arr || [];
                    list.push(`Du wurdest für das Event "${ev.title}" am ${ev.date} fest eingeteilt!`);
                    return list.slice(-50); 
                });
            });
            closeModal('planner-modal');
            showToast('Einteilung gespeichert!', 'success');
        })
        .catch(() => showToast('Fehler beim Speichern der Einteilung.', 'error'));
}

        notizen: $('ev-notizen').value, customerContactId: $('ev-customer-select').value
    };

        updates.assignedCrew = oldEv.assignedCrew || [];

        const related = state.timesheets.filter(ts => eq(ts.eventId, id));

function markCleaningDone(eid) {
    const ev = find(state.events, eid);
    if (!ev) return;
    const pts = ev.personen > 100 ? 3 : (ev.personen > 50 ? 2 : 1);
    const uid = auth.currentUser.uid;
    runTransaction(ref(db, `users/${uid}/cleaningPoints`), cur => (cur || 0) + pts)
        .then(() => set(ref(db, `events/${eid}/cleaningDoneBy`), uid))
        .then(() => {
            showToast(`${pts} Putz-Punkte gesammelt!`, 'success');
            closeModal('detail-modal');
        })
        .catch(() => showToast('Fehler beim Speichern.', 'error'));
}

function changeCleaningPoints(uid, delta) {
    if (state.role !== 'superadmin') return;
    runTransaction(ref(db, `users/${uid}/cleaningPoints`), cur => Math.max(0, (cur || 0) + delta))
        .catch(() => showToast('Fehler beim Ändern der Punkte.', 'error'));
}

function resetCleaningRanking() {
    if (state.role !== 'superadmin') return;
    if (!confirm("Soll das Putz-Ranking für ALLE Admins wirklich auf 0 zurückgesetzt werden?")) return;
    
    const updates = {};
    state.users.forEach(u => {
        if ((u.role === 'admin' || u.role === 'superadmin') && u.cleaningPoints !== undefined && u.cleaningPoints !== 0) {
            updates[`users/${u.uid}/cleaningPoints`] = 0;
        }
    });
    
    if (Object.keys(updates).length > 0) {
        dbAction(update(ref(db), updates), 'Putz-Ranking erfolgreich zurückgesetzt!');
    } else {
        showToast('Ranking ist bereits auf 0.', 'success');
        closeModal('ranking-modal');
    }
}

function logHours(eid) {
    const startEl = $('ts-start-' + eid), endEl = $('ts-end-' + eid);
    if (!startEl || !endEl) return;
    const startVal = startEl.value, endVal = endEl.value;
    if (!startVal || !endVal) return showToast("Bitte Start- und Endzeit angeben!", 'error');
    const uid = auth.currentUser.uid;
    const ev = find(state.events, eid);
    if (!ev) return;
    const user = find(state.users, uid, 'uid');
    const wage = user ? (Number(user.wage) || 14) : 14;
    const h = calculateHours(startVal, endVal, ev.date, ev.endDate || ev.date);
    if (h <= 0) return showToast("Zeitraum ist ungültig oder 0 Stunden.", 'error');
    const existingTs = state.timesheets.find(t => eq(t.eventId, eid) && eq(t.userId, uid));
    const tsId = existingTs ? existingTs.id : 'ts_' + Date.now() + '_' + uid;
    const bonus = existingTs ? existingTs.bonus : 0;
    const totalHours = h + bonus;
    const ts = {
        id: tsId, eventId: eid, userId: uid, date: ev.date,
        start: startVal, end: endVal, bonus,
        workHours: Number(h.toFixed(2)), totalHours: Number(totalHours.toFixed(2)),
        wage: Number(wage), totalCost: Number((totalHours * wage).toFixed(2))
    };
    dbAction(set(ref(db, 'timesheets/' + tsId), ts), 'Zeiten erfasst!');
}

function renderTimesheets() {
    if (!isAdminRole()) return;
    const valid = state.timesheets.filter(ts => ts && ts.userId && ts.eventId);
    const eventStats = {}, userStats = {};
    const tsRows = [];
    valid.sort((a, b) => (b.date || "").localeCompare(a.date || "")).forEach(ts => {
        const user = find(state.users, ts.userId, 'uid') || { name: 'Gelöschter User', wage: 0 };
        const ev = find(state.events, ts.eventId) || { title: 'Gelöschtes Event' };
        const tHours = Number(ts.totalHours) || 0;
        const tCost = Number(ts.totalCost) || 0;
        if (!eventStats[ts.eventId]) eventStats[ts.eventId] = { title: ev.title, totalHours: 0, totalCost: 0 };
        eventStats[ts.eventId].totalHours += tHours;
        eventStats[ts.eventId].totalCost += tCost;
        if (!userStats[ts.userId]) userStats[ts.userId] = { name: user.name, totalHours: 0, totalCost: 0, events: new Set() };
        userStats[ts.userId].totalHours += tHours;
        userStats[ts.userId].totalCost += tCost;
        userStats[ts.userId].events.add(ev.title);
        tsRows.push(`<tr>
            <td><b>${esc(ev.title)}</b></td>
            <td>${esc(user.name)}</td>
            <td>${esc(ts.date || '-')}</td>
            <td>${esc(ts.start || '-')} - ${esc(ts.end || '-')}</td>
            <td>${tHours.toFixed(2)}h ${Number(ts.bonus) > 0 ? `(+${esc(ts.bonus)}h)` : ''}</td>
            <td>${fmt(tCost)}</td>
            <td>
                <button class="btn-sm" onclick="openTimesheetModal('${escJs(ts.id)}')">✏️</button>
                <button class="btn-sm btn-danger" onclick="deleteTimesheet('${escJs(ts.id)}')">🗑️</button>
                <button class="btn-sm btn-primary" onclick="printReceipt('${escJs(ts.id)}')">PDF</button>
            </td>
        </tr>`);
    });
    const lc = $('timesheet-list-container');
    if (lc) lc.innerHTML = buildTable(['Event', 'Mitarbeiter', 'Datum', 'Zeit', 'Std', 'Lohn', 'Aktion'], tsRows, 'Keine erfassten Zeiten.');
    const evRows = Object.values(eventStats).map(es =>
        `<tr><td><b>${esc(es.title)}</b></td><td>${es.totalHours.toFixed(2)}h</td><td><b style="color:var(--red)">${fmt(es.totalCost)}</b></td></tr>`
    );
    const ec = $('timesheet-events-container');
    if (ec) ec.innerHTML = buildTable(['Event', 'Gesamtstunden', 'Gesamtkosten'], evRows, 'Keine Event-Daten.');
    const usrRows = Object.values(userStats).map(us =>
        `<tr><td><b>${esc(us.name)}</b></td><td>${us.totalHours.toFixed(2)}h</td><td><b style="color:var(--green)">${fmt(us.totalCost)}</b></td><td>${esc(Array.from(us.events).join(', '))}</td></tr>`
    );
    const uc = $('timesheet-users-container');
    if (uc) uc.innerHTML = buildTable(['Mitarbeiter', 'Gesamtstunden', 'Gesamtlohn', 'Eingesetzt bei'], usrRows, 'Keine Mitarbeiter-Daten.');
}

// PIZZA & DIPS
// ============================================================================
function loadPizzaMengenFromStorage() {
    try {
        const saved = localStorage.getItem('hp_pizzaMengen');
        if (saved) pizzaMengen = JSON.parse(saved);
        const savedDips = localStorage.getItem('hp_dipMengen');
        if (savedDips) dipMengen = JSON.parse(savedDips);
    } catch (e) {}
    renderPizzaGrid();
}

function savePizzaMengenToStorage() {
    try {
        localStorage.setItem('hp_pizzaMengen', JSON.stringify(pizzaMengen));
        localStorage.setItem('hp_dipMengen', JSON.stringify(dipMengen));
    } catch (e) {}
}

function renderPizzaGrid() {
    const c = $('pizza-grid');
    if (!c) return;
    c.innerHTML = state.pizzas.map(p => `
        <div class="card">
            <div class="card-title">${esc(p.name)} <span>${fmt(p.price)}</span></div>
            <div class="pizza-qty">
                <button onclick="changePizza('${escJs(p.name)}', -5)">-</button>
                <input type="number" id="pqty-${esc(p.id)}" value="${pizzaMengen[p.name] || 0}" readonly>
                <button onclick="changePizza('${escJs(p.name)}', 5)">+</button>
            </div>
        </div>`).join('');
    if ($('dqty-aioli')) $('dqty-aioli').value = dipMengen.aioli || 0;
    if ($('dqty-hothoney')) $('dqty-hothoney').value = dipMengen.hothoney || 0;
    renderPizzaResult();
}

function changePizza(n, d) {
    pizzaMengen[n] = Math.max(0, (pizzaMengen[n] || 0) + d);
    savePizzaMengenToStorage();
    renderPizzaGrid();
}

function changeDip(n, d) {
    dipMengen[n] = Math.max(0, (dipMengen[n] || 0) + d);
    savePizzaMengenToStorage();
    const el = $('dqty-' + n); if (el) el.value = dipMengen[n];
    renderPizzaResult();
}

function resetPizza() {
    if (!confirm("Pizza-Kalkulation wirklich zurücksetzen?")) return;
    pizzaMengen = {};
    dipMengen = { aioli: 0, hothoney: 0 };
    savePizzaMengenToStorage();
    renderPizzaGrid();
}

function calcIngredients() {
    const raw = {};
    const addGrams = (key, grams) => { raw[key] = (raw[key] || 0) + grams; };
    const expand = (recipeId, qty) => {
        const recipe = find(state.recipes, recipeId);
        if (!recipe) return;
        const ratio = recipe.yieldGrams ? (qty / recipe.yieldGrams) : qty;
        (recipe.items || []).forEach(item => {
            if (item.recipeId) expand(item.recipeId, item.grams * ratio);
            else if (item.ingredientId) addGrams(item.ingredientId, item.grams * ratio);
        });
    };
    state.pizzas.forEach(pizza => {
        const qty = pizzaMengen[pizza.name] || 0;
        if (qty > 0) (pizza.items || []).forEach(item => {
            if (item.recipeId) expand(item.recipeId, item.grams * qty);
            else if (item.ingredientId) addGrams(item.ingredientId, item.grams * qty);
        });
    });
    if (dipMengen.aioli > 0) expand('rec_aioli', dipMengen.aioli);
    if (dipMengen.hothoney > 0) expand('rec_honey', dipMengen.hothoney);
    return raw;
}

function renderPizzaResult() {
    const raw = calcIngredients();
    const target = $('ingredient-result');
    if (!target) return;
    if (Object.keys(raw).length === 0) { target.innerHTML = `<div class="muted">Keine Werte kalkuliert.</div>`; return; }
    const items = [];
    let grossTotal = 0, netTotal = 0;
    for (const [article, grams] of Object.entries(raw)) {
        if (grams < 0.1) continue;
        const ing = getIngredient(article) || { supplier: 'Sonstige', category: 'Sonstiges', priceGross: 0, priceNet: 0 };
        const kg = grams / 1000;
        const costBrutto = kg * (Number(ing.priceGross) || 0);
        const costNetto = kg * (Number(ing.priceNet) || 0);
        grossTotal += costBrutto; netTotal += costNetto;
        items.push({ art: article, g: grams, sup: ing.supplier, costBrutto });
    }
    const bySup = {};
    items.forEach(item => { (bySup[item.sup] = bySup[item.sup] || []).push(item); });
    let html = '';
    Object.keys(bySup).sort().forEach(sup => {
        let subTotal = 0;
        const rows = bySup[sup].sort((a, b) => a.art.localeCompare(b.art)).map(item => {
            subTotal += item.costBrutto;
            return `<div class="row-list">
                <div><b>${esc(item.art)}</b><br><span class="muted" style="font-size:12px;">${fmtKG(item.g)}</span></div>
                <div style="font-weight:600">${item.costBrutto > 0 ? fmt(item.costBrutto) : '–'}</div>
            </div>`;
        }).join('');
        html += `<div class="card" style="padding:0; margin-bottom:16px;">
            <div class="section-head"><span>${esc(sup)}</span><span>${fmt(subTotal)}</span></div>
            <div style="padding:0 16px;">${rows}</div>
        </div>`;
    });
    html += `<div class="summary-bar">Gesamt Brutto: ${fmt(grossTotal)} <br><span style="font-size:12px; font-weight:normal; color:var(--text);">Netto: ${fmt(netTotal)}</span></div>`;
    target.innerHTML = html;
}

function saveToEinkauf() {
    const raw = calcIngredients();
    if (Object.keys(raw).length === 0) return showToast('Nichts zu speichern.', 'error');
    if (!confirm("Bestehende automatisch generierte Einträge werden ersetzt. Manuelle Einträge bleiben erhalten. Fortfahren?")) return;
    get(ref(db, 'einkauf')).then(snap => {
        let arr = snap.val();
        arr = Array.isArray(arr) ? arr : (arr ? Object.values(arr).filter(Boolean) : []);
        arr = arr.filter(e => e && !e.autoGenerated);
        for (const [article, grams] of Object.entries(raw)) {
            const ing = getIngredient(article) || {};
            const kg = grams / 1000;
            arr.push({
                id: 'ek_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
                artikel: article,
                artikelnummer: ing.articleNumber || '',
                lieferant: ing.supplier || 'Sonstige',
                kategorie: ing.category || 'Sonstiges',
                menge: parseFloat(kg.toFixed(3)),
                einheit: 'kg',
                preis: Number(ing.priceNet) || 0,
                preisBrutto: Number(ing.priceGross) || 0,
                autoGenerated: true
            });
        }
        dbAction(set(ref(db, 'einkauf'), arr), 'In Einkaufsliste übernommen!');
    });
}

// ============================================================================
// CATERING KALKULATOR
// ============================================================================
function calcCatering() {
    const gE = $('cat-gaeste'), kE = $('cat-km');
    if (!gE || !kE) return;
    const gaeste = parseFloat(gE.value) || 0;
    const km = parseFloat(kE.value) || 0;
    const rE = $('cat-result-rows'), tot = $('cat-brutto-total');
    if (!rE || !tot) return;
    if (gaeste < 30) {
        rE.innerHTML = '<div style="color:var(--red); font-weight:600; padding:10px;">Berechnung erst ab 30 Gästen möglich.</div>';
        tot.textContent = '0,00 €';
        $('cat-marge-display').value = '-';
        return;
    }
    const defs = state.cateringDefaults || { gas: 10, entsorgung: 15, miete: 45, kmsatz: 0.8, waren: 3.5, ust: 1.19, stundensatz: 14 };
    const stundensatz = Number(defs.stundensatz) || 14;
    const sortedScenarios = [...(state.cateringScenarios || [])].sort((a, b) => Number(a.max) - Number(b.max));
    let sz = sortedScenarios.find(s => gaeste >= Number(s.min) && gaeste <= Number(s.max));
    if (!sz && sortedScenarios.length > 0 && gaeste > Number(sortedScenarios[sortedScenarios.length - 1].max)) {
        sz = sortedScenarios[sortedScenarios.length - 1];
    }
    if (!sz) {
        rE.innerHTML = '<div class="muted">Keine Staffelung hinterlegt.</div>';
        tot.textContent = '0,00 €';
        return;
    }
    $('cat-marge-display').value = `${sz.label} (${sz.marge})`;
    const pK = Number(sz.stunden) * stundensatz;
    const wE = gaeste * Number(defs.waren);
    const kK = km * Number(defs.kmsatz);
    const fK = Number(defs.gas) + Number(defs.entsorgung) + Number(defs.miete);
    const mW = (pK + wE + kK + fK) * Number(sz.marge);
    const zN = pK + wE + kK + fK + mW;
    const zB = zN * Number(defs.ust);
    rE.innerHTML = [
        ['Gäste', gaeste],
        ['Personal (Std)', sz.stunden + ' h'],
        ['Personalkosten', fmt(pK)],
        ['Wareneinsatz', fmt(wE)],
        ['Fahrtkosten', fmt(kK)],
        ['Fixkosten (Gas, Miete..)', fmt(fK)],
        ['Ziel Netto', fmt(zN)]
    ].map(([l, v]) => `<div class="row-list"><span class="muted">${esc(l)}</span><span style="font-weight:600">${esc(v)}</span></div>`).join('');
    tot.textContent = fmt(zB);
}

function renderEinkauf() {
    const c = $('einkauf-kategorien');
    if (!c) return;
    if (!state.einkauf.length) { c.innerHTML = '<div class="card muted">Liste ist leer.</div>'; return; }
    let html = '', grandTotal = 0;
    const sups = [...new Set(state.einkauf.map(e => e.lieferant || 'Sonstige'))].sort();
    sups.forEach(sup => {
        let supTotal = 0;
        const rows = state.einkauf.filter(e => (e.lieferant || 'Sonstige') === sup).map(e => {
            const pNetto = Number(e.preis) || 0;
            const pBrutto = Number(e.preisBrutto) || (pNetto * 1.07);
            const sumNetto = Number(e.menge) * pNetto;
            const sumBrutto = Number(e.menge) * pBrutto;
            supTotal += sumBrutto; grandTotal += sumBrutto;
            return `<div class="row-list" style="align-items:center;">
                <div>
                    <b>${esc(e.artikel)}</b> ${e.autoGenerated ? '<span style="color:var(--blue); font-size:10px;">(Auto)</span>' : ''}<br>
                    <span class="muted" style="font-size:11px;">Art: ${esc(e.artikelnummer || '-')} | ${esc(e.kategorie)}</span>
                </div>
                <div style="text-align:right;">
                    <b style="color:var(--blue)">${e.einheit === 'kg' ? fmtKG(Number(e.menge) * 1000) : esc(e.menge + ' ' + e.einheit)}</b><br>
                    <span style="font-size:11px;">Brutto: ${fmt(sumBrutto)} <span class="muted">(Netto: ${fmt(sumNetto)})</span></span>
                </div>
            </div>`;
        }).join('');
        html += `<div class="card" style="padding:0; margin-bottom:16px;">
            <div class="section-head"><span>${esc(sup)}</span><span>${fmt(supTotal)}</span></div>
            <div style="padding:0 16px;">${rows}</div>
        </div>`;
    });
    html += `<div class="summary-bar">Gesamtsumme Brutto: ${fmt(grandTotal)}</div>`;
    c.innerHTML = html;
}

function clearEinkauf() {
    if (!confirm('Möchtest du die Liste wirklich komplett leeren?')) return;
    set(ref(db, 'einkauf'), []);
    showToast("Liste geleert!", 'success');
}

function openIngredientModal() {
    ['ing-new-name', 'ing-new-artnr', 'ing-new-netto', 'ing-new-brutto'].forEach(id => $(id).value = '');
    openModal('ingredient-modal');
}

function saveNewIngredient() {
    const name = $('ing-new-name').value.trim();
    const artNr = $('ing-new-artnr').value.trim();
    const netto = parseFloat($('ing-new-netto').value);
    const brutto = parseFloat($('ing-new-brutto').value);
    if (!name || !artNr || isNaN(netto) || isNaN(brutto)) {
        return alert("Bitte fülle alle Felder inkl. Preise und Artikelnummer aus!");
    }
    if (/[.#$\[\]\/]/.test(name)) {
        return alert("Der Name darf keine der Zeichen . # $ [ ] / enthalten.");
    }
    const ing = {
        id: name, name, articleNumber: artNr,
        supplier: $('ing-new-sup').value,
        category: $('ing-new-cat').value,
        unit: $('ing-new-unit').value,
        priceNet: netto, priceGross: brutto, active: true
    };
    dbAction(set(ref(db, 'ingredients/' + name), ing), 'Zutat gespeichert!')
        .then(() => closeModal('ingredient-modal'));
}

function renderBuilderItems() {
    const ingOpts = state.ingredients.map(i => `<option value="ing_${esc(i.id)}">${esc(i.name)}</option>`).join('');
    const recOpts = state.recipes.filter(r => !eq(r.id, builderEditId)).map(r => `<option value="rec_${esc(r.id)}">${esc(r.name)} (Rezept)</option>`).join('');
    const html = builderItems.map((item, idx) => `
        <div style="display:flex; gap:8px; margin-bottom:8px; align-items:center; background:#f8fafc; padding:8px; border-radius:8px;">
            <select style="flex:1; font-size:12px;" data-idx="${idx}" class="builder-ref-select">
                <option value="">-- Zutat / Rezept --</option>
                <optgroup label="Zutaten">${ingOpts}</optgroup>
                <optgroup label="Rezepte">${recOpts}</optgroup>
            </select>
            <input type="number" style="width:70px; font-size:12px;" placeholder="g/Stk" value="${esc(item.grams)}" data-idx="${idx}" class="builder-grams-input">
            <button class="btn-danger btn-sm" data-idx="${idx}" type="button">X</button>
        </div>`).join('');
    const c = $('builder-items-container');
    c.innerHTML = html;
    c.querySelectorAll('.builder-ref-select').forEach(sel => {
        const idx = Number(sel.dataset.idx);
        sel.value = builderItems[idx] ? builderItems[idx].ref : '';
        sel.addEventListener('change', () => {
            builderItems[idx].ref = sel.value;
            calculateBuilderTotal();
        });
    });
    c.querySelectorAll('.builder-grams-input').forEach(inp => {
        const idx = Number(inp.dataset.idx);
        inp.addEventListener('change', () => {
            builderItems[idx].grams = Number(inp.value);
            calculateBuilderTotal();
        });
    });
    c.querySelectorAll('button[data-idx]').forEach(btn => {
        const idx = Number(btn.dataset.idx);
        btn.addEventListener('click', () => {
            builderItems.splice(idx, 1);
            renderBuilderItems();
            calculateBuilderTotal();
        });
    });
}

function addBuilderItemRow() {
    builderItems.push({ ref: '', grams: 0 });
    renderBuilderItems();
}

function calculateBuilderTotal() {
    let totalCostGross = 0, totalCostNet = 0;
    const expandCost = (rId, qty) => {
        const r = find(state.recipes, rId);
        if (!r) return { gross: 0, net: 0 };
        const ratio = r.yieldGrams ? (qty / r.yieldGrams) : qty;
        let cGross = 0, cNet = 0;
        (r.items || []).forEach(i => {
            if (i.recipeId) {
                const sub = expandCost(i.recipeId, i.grams * ratio);
                cGross += sub.gross; cNet += sub.net;
            } else if (i.ingredientId) {
                const ing = getIngredient(i.ingredientId);
                if (ing) {
                    cGross += (i.grams * ratio / 1000) * (Number(ing.priceGross) || 0);
                    cNet += (i.grams * ratio / 1000) * (Number(ing.priceNet) || 0);
                }
            }
        });
        return { gross: cGross, net: cNet };
    };
    builderItems.forEach(b => {
        if (!b.ref || b.grams <= 0) return;
        const realId = b.ref.replace(/^(ing_|rec_)/, '');
        if (b.ref.startsWith('rec_')) {
            const sub = expandCost(realId, b.grams);
            totalCostGross += sub.gross; totalCostNet += sub.net;
        } else {
            const ing = getIngredient(realId);
            if (ing) {
                totalCostGross += (b.grams / 1000) * (Number(ing.priceGross) || 0);
                totalCostNet += (b.grams / 1000) * (Number(ing.priceNet) || 0);
            }
        }
    });
    const preview = $('builder-calc-preview');
    if (totalCostGross > 0) {
        preview.style.display = 'block';
        $('builder-calc-total-gross').textContent = fmt(totalCostGross) + ' (Brutto)';
        $('builder-calc-total-net').textContent = fmt(totalCostNet) + ' (Netto)';
    } else {
        preview.style.display = 'none';
    }
}

function openRecipeModal(id) {
    if (id && typeof id === 'object') id = null; 
    builderType = 'recipe';
    builderEditId = id || null;
    const r = id ? find(state.recipes, id) : null;
    $('builder-title').textContent = r ? 'Rezept bearbeiten' : 'Neues Rezept';
    $('builder-name').value = r ? r.name : '';
    $('builder-param-label').textContent = 'Ertrag (Yield in Gramm)';
    $('builder-param').value = r ? r.yieldGrams : 100;
    builderItems = (r && r.items ? r.items : []).map(i => ({
        grams: i.grams,
        ref: i.ingredientId ? 'ing_' + i.ingredientId : (i.recipeId ? 'rec_' + i.recipeId : '')
    }));
    $('builder-calc-preview').style.display = 'none';
    renderBuilderItems();
    calculateBuilderTotal();
    openModal('builder-modal');
}

function openPizzaModal(id) {
    if (id && typeof id === 'object') id = null; 
    builderType = 'pizza';
    builderEditId = id || null;
    const p = id ? find(state.pizzas, id) : null;
    $('builder-title').textContent = p ? 'Pizza bearbeiten' : 'Neue Pizza';
    $('builder-name').value = p ? p.name : '';
    $('builder-param-label').textContent = 'Verkaufspreis (€)';
    $('builder-param').value = p ? p.price : 0;
    builderItems = (p && p.items ? p.items : []).map(i => ({
        grams: i.grams,
        ref: i.ingredientId ? 'ing_' + i.ingredientId : (i.recipeId ? 'rec_' + i.recipeId : '')
    }));
    renderBuilderItems();
    calculateBuilderTotal();
    openModal('builder-modal');
}

function saveBuilder() {
    const name = $('builder-name').value.trim();
    const param = parseFloat($('builder-param').value) || 0;
    if (!name) return alert("Bitte Namen eingeben");
    const items = builderItems.map(b => {
        if (!b.ref) return null;
        const realId = b.ref.replace(/^(ing_|rec_)/, '');
        return b.ref.startsWith('rec_') ? { recipeId: realId, grams: b.grams } : { ingredientId: realId, grams: b.grams };
    }).filter(Boolean);
    if (builderType === 'recipe') {
        const id = builderEditId || 'rec_' + Date.now();
        dbAction(set(ref(db, 'recipes/' + id), { id, name, yieldGrams: param, items, active: true }), 'Rezept gespeichert!')
            .then(() => closeModal('builder-modal'));
    } else {
        const id = builderEditId || 'p_' + Date.now();
        dbAction(set(ref(db, 'pizzas/' + id), { id, name, price: param, items, active: true }), 'Pizza gespeichert!')
            .then(() => closeModal('builder-modal'));
    }
}

}
function deleteIngredient(id) {
    if (!confirm("Diese Zutat wirklich löschen? Rezepte, die sie verwenden, könnten danach falsch kalkulieren.")) return;
    dbAction(remove(ref(db, 'ingredients/' + id)), 'Zutat gelöscht', 'Fehler beim Löschen.');
}

// ============================================================================
// SETTINGS RENDER 
// ============================================================================
function renderSettings() {
    const ingRows = [...(state.ingredients || [])].sort((a, b) => a.name.localeCompare(b.name)).map(i => `<tr>
        <td style="max-width:150px; word-wrap:break-word;"><b>${esc(i.name)}</b></td>
        <td>${esc(i.supplier)}<br><span style="font-size:10px;" class="muted">Art: ${esc(i.articleNumber || '-')}</span></td>
        <td><input type="number" step="0.01" data-ing-net="${esc(i.id)}" value="${esc(i.priceNet)}" style="width:70px; padding:6px;"></td>
        <td><input type="number" step="0.01" data-ing-gross="${esc(i.id)}" value="${esc(i.priceGross)}" style="width:70px; padding:6px;"></td>
        <td><button class="btn-danger btn-sm" onclick="deleteIngredient('${escJs(i.id)}')">Löschen</button></td>
    </tr>`);
    const sa = $('settings-art-list');
    if (sa) sa.innerHTML = buildTable(['Zutat', 'Lieferant / Art-Nr', 'Netto', 'Brutto', 'Aktion'], ingRows, 'Keine Zutaten angelegt.');

    const recRows = (state.recipes || []).map(r => `<tr>
        <td><b>${esc(r.name)}</b></td><td>${esc(r.yieldGrams)}g</td>
        <td>
            <button class="btn-sm" onclick="openRecipeModal('${escJs(r.id)}')">Bearbeiten</button>
            <button class="btn-sm btn-danger" onclick="deleteRecipe('${escJs(r.id)}')">Löschen</button>
        </td>
    </tr>`);
    const sr = $('settings-recipes-list');
    if (sr) sr.innerHTML = buildTable(['Rezept', 'Ertrag (g)', 'Aktion'], recRows, 'Keine Rezepte angelegt.');

    const pizRows = (state.pizzas || []).map(p => `<tr>
        <td><b>${esc(p.name)}</b></td><td>${fmt(p.price)}</td>
        <td>
            <button class="btn-sm" onclick="openPizzaModal('${escJs(p.id)}')">Bearbeiten</button>
            <button class="btn-sm btn-danger" onclick="deletePizza('${escJs(p.id)}')">Löschen</button>
        </td>
    </tr>`);
    const sp = $('settings-pizzas-list');
    if (sp) sp.innerHTML = buildTable(['Pizza', 'Preis', 'Aktion'], pizRows, 'Keine Pizzen angelegt.');

    const defs = state.cateringDefaults || {};
    ['gas', 'entsorgung', 'miete', 'kmsatz', 'waren', 'ust', 'stundensatz'].forEach(k => {
        const el = $('set-cat-' + k);
        if (el) el.value = defs[k] !== undefined ? defs[k] : 0;
    });

    renderScenarios();

    const teamRows = state.users.map(u => `<tr>
        <td><b>${esc(u.name || u.email)}</b><br><span style="font-size:10px;" class="muted">${esc(u.email)}</span></td>
        <td>
            <select id="role-${esc(u.uid)}" style="padding:6px;">
                <option value="staff" ${u.role === 'staff' ? 'selected' : ''}>Mitarbeiter</option>
                <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Admin</option>
                <option value="superadmin" ${u.role === 'superadmin' ? 'selected' : ''}>Superadmin</option>
            </select>
        </td>
        <td><input type="number" id="wage-${esc(u.uid)}" value="${esc(u.wage || 14)}" style="width:70px; padding:6px;"></td>
        <td><button class="btn-primary btn-sm" onclick="updateUser('${escJs(u.uid)}')">Speichern</button></td>
    </tr>`);
    const tc = $('team-list-container');
    if (tc) tc.innerHTML = buildTable(['Name', 'Rolle', 'Lohn (€)', 'Aktion'], teamRows, 'Keine User vorhanden.');
}

function renderScenarios() {
    scenarioRows = state.cateringScenarios.map(s => ({ ...s }));
    const c = $('scenarios-container');
    if (!c) return;
    const rows = scenarioRows.map((s, i) => `<tr>
        <td><input data-sc-i="${i}" data-sc-f="label" value="${esc(s.label)}" style="width:100px;padding:6px;"></td>
        <td><input type="number" data-sc-i="${i}" data-sc-f="min" value="${esc(s.min)}" style="width:60px;padding:6px;"></td>
        <td><input type="number" data-sc-i="${i}" data-sc-f="max" value="${esc(s.max)}" style="width:60px;padding:6px;"></td>
        <td><input type="number" data-sc-i="${i}" data-sc-f="stunden" value="${esc(s.stunden)}" style="width:60px;padding:6px;"></td>
        <td><input type="number" step="0.05" data-sc-i="${i}" data-sc-f="marge" value="${esc(s.marge)}" style="width:60px;padding:6px;"></td>
        <td><button class="btn-danger btn-sm" data-sc-del="${i}" type="button">X</button></td>
    </tr>`);
    c.innerHTML = buildTable(['Label', 'Min', 'Max', 'Stunden', 'Marge', ''], rows, 'Keine Staffeln definiert.');
    c.querySelectorAll('input[data-sc-i]').forEach(inp => {
        inp.addEventListener('change', () => {
            const i = Number(inp.dataset.scI);
            const f = inp.dataset.scF;
            scenarioRows[i][f] = ['min', 'max', 'stunden', 'marge'].includes(f) ? Number(inp.value) : inp.value;
        });
    });
    c.querySelectorAll('button[data-sc-del]').forEach(btn => {
        btn.addEventListener('click', () => {
            const i = Number(btn.dataset.scDel);
            scenarioRows.splice(i, 1);
            state.cateringScenarios = [...scenarioRows];
            renderScenarios();
        });
    });
}

function addScenarioRow() {
    scenarioRows.push({ label: 'Neu', min: 0, max: 0, stunden: 0, marge: 0.5 });
    state.cateringScenarios = [...scenarioRows];
    renderScenarios();
}

function saveScenarios() {
    dbAction(set(ref(db, 'cateringScenarios'), scenarioRows), 'Staffeln gespeichert!');
}

function saveSettingsART() {
    const updates = {};
    document.querySelectorAll('[data-ing-net]').forEach(el => {
        updates[`ingredients/${el.dataset.ingNet}/priceNet`] = parseFloat(el.value) || 0;
    });
    document.querySelectorAll('[data-ing-gross]').forEach(el => {
        updates[`ingredients/${el.dataset.ingGross}/priceGross`] = parseFloat(el.value) || 0;
    });
    dbAction(update(ref(db), updates), 'Preise aktualisiert!');
}

function saveCateringSettings() {
    const defs = {};
    ['gas', 'entsorgung', 'miete', 'kmsatz', 'waren', 'ust', 'stundensatz'].forEach(k => {
        defs[k] = parseFloat($('set-cat-' + k).value) || 0;
    });
    dbAction(update(ref(db, 'cateringDefaults'), defs), 'Catering Parameter gespeichert!');
}

function updateUser(uid) {
    const roleEl = $(`role-${uid}`), wageEl = $(`wage-${uid}`);
    if (!roleEl || !wageEl) return;
    dbAction(update(ref(db, `users/${uid}`), {
        role: roleEl.value,
        wage: parseFloat(wageEl.value) || 14
    }), 'Mitarbeiterdaten aktualisiert!');
}
